<article class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col md:flex-row">

    <div class="flex-1 p-6 flex flex-col items-center md:items-start text-center md:text-left">
        <span class="px-2 py-1 bg-blue-50 text-[#003399] text-xs font-bold rounded-md uppercase tracking-wider mb-4">
            Current Weather
        </span>

        <div class="flex flex-col md:flex-row items-center gap-4 md:gap-8">
            <img [src]="getIconUrl(weather.weather[0].icon)" [alt]="weather.weather[0].description"
                class="w-24 h-24 filter drop-shadow-lg">
            <div>
                <div class="flex items-start justify-center md:justify-start">
                    <span class="text-6xl font-extrabold text-gray-800 tracking-tighter">
                        {{ weather.main.temp | kelvinToCelsius }}
                    </span>
                    <span class="text-3xl font-bold text-gray-400 mt-1">°C</span>
                </div>
                <p class="text-lg font-medium text-gray-500 capitalize mt-1">
                    {{ weather.weather[0].description }}
                </p>
            </div>
        </div>

        <div class="flex flex-wrap gap-3 mt-6 w-full md:w-auto">
            <div class="flex-1 bg-gray-50 p-3 rounded-xl flex flex-col items-center min-w-22.5">
                <span class="text-xs text-gray-400 font-bold uppercase">Feels Like</span>
                <span class="text-lg font-bold text-[#003399] mt-1">{{ weather.main.feels_like | kelvinToCelsius
                    }}°</span>
            </div>
            <div class="flex-1 bg-gray-50 p-3 rounded-xl flex flex-col items-center min-w-22.5">
                <span class="text-xs text-gray-400 font-bold uppercase">Humidity</span>
                <span class="text-lg font-bold text-[#003399] mt-1">{{ weather.main.humidity }}%</span>
            </div>
            <div class="flex-1 bg-gray-50 p-3 rounded-xl flex flex-col items-center min-w-22.5">
                <span class="text-xs text-gray-400 font-bold uppercase">Wind</span>
                <span class="text-lg font-bold text-[#003399] mt-1">{{ getWindKmh(weather.wind.speed) }}</span>
            </div>
        </div>
    </div>

    <aside
        class="md:w-72 bg-blue-50/50 p-6 border-t md:border-t-0 md:border-l border-gray-100 flex flex-col justify-center">
        <h3 class="font-bold text-sm text-gray-500 uppercase mb-3">Recommendations</h3>
        <div class="bg-white p-3 rounded-lg shadow-sm border border-blue-100 text-sm text-gray-600 space-y-1">
            <p *ngFor="let rec of recommendations">• {{ rec }}</p>
        </div>
    </aside>

</article>
